<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokseva - Register</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background-color: #5aace0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px 0;
    }

    .logo {
      width: 110px;
      height: 110px;
      background-color: #1a2757;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: -30px;
      z-index: 2;
      position: relative;
    }

    .card {
      background-color: #e8edf2;
      border-radius: 24px;
      padding: 50px 30px 30px 30px;
      width: 420px;
      position: relative;
      z-index: 1;
    }

    .app-name {
      font-size: 20px;
      font-weight: bold;
      color: #1a2757;
      text-align: center;
      margin-bottom: 4px;
    }

    .app-tagline {
      font-size: 12px;
      color: #607080;
      text-align: center;
      margin-bottom: 6px;
    }

    .back-link {
      text-align: center;
      margin-bottom: 20px;
    }

    .back-link a {
      color: #607080;
      font-size: 13px;
      text-decoration: none;
    }

    .back-link a:hover { color: #1a2757; }

    .role-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .role-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 50px;
      background-color: #80cdd4;
      color: #1a2757;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .role-btn.active {
      background-color: #4aabb5;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .role-btn:hover { background-color: #5bbec8; }

    .form-section {
      display: none;
      background-color: #80cdd4;
      border-radius: 16px;
      padding: 24px 20px;
    }

    .form-section.active { display: block; }

    .form-title {
      font-size: 15px;
      font-weight: bold;
      color: #1a2757;
      text-align: center;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #1a2757;
      margin-bottom: 4px;
      font-weight: bold;
      padding-left: 4px;
    }

    input {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      color: #607080;
      background-color: white;
      margin-bottom: 14px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus { box-shadow: 0 0 0 2px #1a2757; }

    input::placeholder {
      color: #a0b0c0;
      font-size: 13px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #1a2757;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn:hover { background-color: #243580; }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Message boxes */
    .message {
      display: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: bold;
      text-align: center;
    }

    .message.error {
      display: block;
      background-color: #fde8e8;
      color: #b91c1c;
      border: 1px solid #f5a5a5;
    }

    .message.success {
      display: block;
      background-color: #e0f7ea;
      color: #15803d;
      border: 1px solid #86efac;
    }

    .message.info {
      display: block;
      background-color: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
    }

    /* OTP section — hidden until OTP is sent */
    .otp-section {
      display: none;
      margin-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.4);
      padding-top: 14px;
    }

    .otp-section.show { display: block; }

    .resend-link {
      text-align: center;
      margin-top: 10px;
      font-size: 12px;
      color: #1a2757;
    }

    .resend-link a {
      color: #1a2757;
      font-weight: bold;
      text-decoration: underline;
      cursor: pointer;
    }

    .login-link {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #607080;
    }

    .login-link a {
      color: #1a2757;
      font-weight: bold;
      text-decoration: none;
    }

    .login-link a:hover { text-decoration: underline; }

  </style>
</head>

<body>

  <!-- LOGO CIRCLE -->
  <div class="logo">LS</div>

  <!-- CARD -->
  <div class="card">

    <div class="app-name">Lokseva</div>
    <div class="app-tagline">Local Services, At Your Doorstep</div>

    <div class="back-link">
      <a href="index.html">← Back to Home</a>
    </div>

    <!-- ROLE BUTTONS -->
    <div class="role-buttons">
      <button class="role-btn" onclick="selectRole('user')">👤 USER</button>
      <button class="role-btn" onclick="selectRole('provider')">🔧 PROVIDER</button>
    </div>

    <!-- ===== USER REGISTER FORM ===== -->
    <div class="form-section" id="form-user">
      <div class="form-title">Create User Account</div>
      <div class="message" id="msg-user"></div>

      <label>Full Name</label>
      <input type="text" id="user-name" placeholder="Enter your full name" />

      <label>Email (Gmail only)</label>
      <input type="email" id="user-email" placeholder="example@gmail.com" />

      <label>Phone Number</label>
      <input type="tel" id="user-phone" placeholder="Enter 10-digit phone number" maxlength="10" />

      <label>Password</label>
      <input type="password" id="user-password" placeholder="Min 8 chars, 1 number, 1 special char" />

      <label>Confirm Password</label>
      <input type="password" id="user-confirm" placeholder="Re-enter your password" />

      <button class="btn" id="user-register-btn" onclick="registerUser('user')">
        Register as User
      </button>

      <!-- OTP box — appears after registration -->
      <div class="otp-section" id="otp-section-user">
        <label>Enter OTP sent to your Gmail</label>
        <input type="text" id="user-otp" placeholder="Enter 6-digit OTP" maxlength="6"/>
        <button class="btn" id="user-verify-btn" onclick="verifyOTP('user')">
          ✅ Verify OTP
        </button>
        <div class="resend-link">
          Didn't receive it?
          <a onclick="resendOTP('user')">Resend OTP</a>
        </div>
      </div>
    </div>

    <!-- ===== PROVIDER REGISTER FORM ===== -->
    <div class="form-section" id="form-provider">
      <div class="form-title">Create Provider Account</div>
      <div class="message" id="msg-provider"></div>

      <label>Full Name</label>
      <input type="text" id="provider-name" placeholder="Enter your full name" />

      <label>Email (Gmail only)</label>
      <input type="email" id="provider-email" placeholder="example@gmail.com" />

      <label>Phone Number</label>
      <input type="tel" id="provider-phone" placeholder="Enter 10-digit phone number" maxlength="10" />

      <label>Password</label>
      <input type="password" id="provider-password" placeholder="Min 8 chars, 1 number, 1 special char" />

      <label>Confirm Password</label>
      <input type="password" id="provider-confirm" placeholder="Re-enter your password" />

      <button class="btn" id="provider-register-btn" onclick="registerUser('provider')">
        Register as Provider
      </button>

      <!-- OTP box — appears after registration -->
      <div class="otp-section" id="otp-section-provider">
        <label>Enter OTP sent to your Gmail</label>
        <input type="text" id="provider-otp" placeholder="Enter 6-digit OTP" maxlength="6"/>
        <button class="btn" id="provider-verify-btn" onclick="verifyOTP('provider')">
          ✅ Verify OTP
        </button>
        <div class="resend-link">
          Didn't receive it?
          <a onclick="resendOTP('provider')">Resend OTP</a>
        </div>
      </div>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html">Login here</a>
    </div>

  </div><!-- end card -->


  <script>

    // Stores email after registration so OTP verify knows who to verify
    var currentEmail = '';
    var currentRole  = '';

    // ── Role switcher ──
    function selectRole(role) {
      currentRole = role;
      document.querySelectorAll('.role-btn').forEach(function(b) {
        b.classList.remove('active');
        if (b.textContent.toLowerCase().includes(role)) b.classList.add('active');
      });
      document.querySelectorAll('.form-section').forEach(function(f) {
        f.classList.remove('active');
      });
      document.getElementById('form-' + role).classList.add('active');
      clearMessage('user');
      clearMessage('provider');
    }

    function showMessage(role, text, type) {
      var box = document.getElementById('msg-' + role);
      box.textContent = text;
      box.className = 'message ' + type;
    }

    function clearMessage(role) {
      var box = document.getElementById('msg-' + role);
      box.textContent = '';
      box.className = 'message';
    }

    // ══════════════════════════════════════════
    // STEP 1 — Register button clicked
    // Validates form then calls /auth/register
    // Backend saves user + sends OTP to Gmail
    // ══════════════════════════════════════════
    async function registerUser(role) {
      var name     = document.getElementById(role + '-name').value.trim();
      var email    = document.getElementById(role + '-email').value.trim();
      var phone    = document.getElementById(role + '-phone').value.trim();
      var password = document.getElementById(role + '-password').value.trim();
      var confirm  = document.getElementById(role + '-confirm').value.trim();
      var btn      = document.getElementById(role + '-register-btn');

      // ── Validations ──
      if (!name || !email || !phone || !password || !confirm) {
        showMessage(role, '⚠️ Please fill in all fields.', 'error'); return;
      }
      if (name.split(' ').filter(Boolean).length < 2) {
        showMessage(role, '⚠️ Enter your first and last name.', 'error'); return;
      }
      if (!/^[a-zA-Z0-9._%+-]+@gmail\.com$/.test(email)) {
        showMessage(role, '⚠️ Please use a valid @gmail.com address.', 'error'); return;
      }
      if (!/^[0-9]{10}$/.test(phone)) {
        showMessage(role, '⚠️ Phone must be exactly 10 digits.', 'error'); return;
      }
      if (password.length < 8) {
        showMessage(role, '⚠️ Password must be at least 8 characters.', 'error'); return;
      }
      if (!/[0-9]/.test(password) || !/[!@#$%^&*(),.?":{}|<>_\-]/.test(password)) {
        showMessage(role, '⚠️ Password needs a number and a special character.', 'error'); return;
      }
      if (password !== confirm) {
        showMessage(role, '⚠️ Passwords do not match.', 'error'); return;
      }

      // ── Call backend ──
      btn.disabled = true;
      btn.textContent = '⏳ Sending OTP...';
      showMessage(role, '⏳ Sending OTP to ' + email + '...', 'info');

      try {
        const res  = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, password, role })
        });
        const data = await res.json();

        if (!data.success) {
          showMessage(role, '⚠️ ' + data.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Register as ' + role.charAt(0).toUpperCase() + role.slice(1);
          return;
        }

        // ── OTP sent! Show OTP input box ──
        currentEmail = email;
        currentRole  = role;
        showMessage(role, '✅ OTP sent to your Gmail! Check your inbox.', 'success');
        document.getElementById('otp-section-' + role).classList.add('show');
        btn.textContent = '✅ OTP Sent';

      } catch (err) {
        showMessage(role, '⚠️ Cannot connect to server. Is Node.js running?', 'error');
        btn.disabled = false;
        btn.textContent = 'Register as ' + role.charAt(0).toUpperCase() + role.slice(1);
      }
    }

    // ══════════════════════════════════════════
    // STEP 2 — Verify OTP button clicked
    // Sends OTP to /auth/verify-otp
    // On success → redirects to login page
    // ══════════════════════════════════════════
    async function verifyOTP(role) {
      var otp = document.getElementById(role + '-otp').value.trim();
      var btn = document.getElementById(role + '-verify-btn');

      if (!otp || otp.length !== 6 || !/^[0-9]{6}$/.test(otp)) {
        showMessage(role, '⚠️ Please enter the 6-digit OTP.', 'error'); return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Verifying...';

      try {
        const res  = await fetch('/auth/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, otp })
        });
        const data = await res.json();

        if (!data.success) {
          showMessage(role, '⚠️ ' + data.message, 'error');
          btn.disabled = false;
          btn.textContent = '✅ Verify OTP';
          return;
        }

        showMessage(role, '✅ Email verified! Redirecting to login...', 'success');
        setTimeout(function() {
          window.location.href = 'login.html';
        }, 2000);

      } catch (err) {
        showMessage(role, '⚠️ Cannot connect to server. Is Node.js running?', 'error');
        btn.disabled = false;
        btn.textContent = '✅ Verify OTP';
      }
    }

    // ══════════════════════════════════════════
    // RESEND OTP — calls /auth/resend-otp
    // ══════════════════════════════════════════
    async function resendOTP(role) {
      if (!currentEmail) {
        showMessage(role, '⚠️ Please register first.', 'error'); return;
      }

      showMessage(role, '⏳ Resending OTP...', 'info');

      try {
        const res  = await fetch('/auth/resend-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail })
        });
        const data = await res.json();

        showMessage(role,
          data.success ? '✅ New OTP sent to your Gmail!' : '⚠️ ' + data.message,
          data.success ? 'success' : 'error'
        );

      } catch (err) {
        showMessage(role, '⚠️ Cannot connect to server.', 'error');
      }
    }

  </script>

</body>
</html>
