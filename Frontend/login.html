<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lokseva - Login</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      background-color: #5aace0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .logo {
      width: 110px;
      height: 110px;
      background-color: #1a2757;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin-bottom: -30px;
      z-index: 2;
      position: relative;
    }

    .card {
      background-color: #e8edf2;
      border-radius: 24px;
      padding: 50px 30px 30px 30px;
      width: 420px;
      position: relative;
      z-index: 1;
    }

    .app-name {
      font-size: 20px;
      font-weight: bold;
      color: #1a2757;
      text-align: center;
      margin-bottom: 4px;
    }

    .app-tagline {
      font-size: 12px;
      color: #607080;
      text-align: center;
      margin-bottom: 20px;
    }

    .role-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .role-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 50px;
      background-color: #80cdd4;
      color: #1a2757;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .role-btn.active {
      background-color: #4aabb5;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .role-btn:hover { background-color: #5bbec8; }

    .form-section {
      display: none;
      background-color: #80cdd4;
      border-radius: 16px;
      padding: 24px 20px;
    }

    .form-section.active { display: block; }

    .form-title {
      font-size: 15px;
      font-weight: bold;
      color: #1a2757;
      text-align: center;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #1a2757;
      margin-bottom: 4px;
      font-weight: bold;
      padding-left: 4px;
    }

    input {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      color: #607080;
      background-color: white;
      margin-bottom: 14px;
      box-sizing: border-box;
      outline: none;
    }

    input::placeholder {
      color: #a0b0c0;
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    input:focus { box-shadow: 0 0 0 2px #1a2757; }

    .btn {
      width: 100%;
      padding: 12px;
      background-color: #1a2757;
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
    }

    .btn:hover { background-color: #243580; }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Message boxes */
    .message {
      display: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: bold;
      text-align: center;
    }

    .message.error {
      display: block;
      background-color: #fde8e8;
      color: #b91c1c;
      border: 1px solid #f5a5a5;
    }

    .message.success {
      display: block;
      background-color: #e0f7ea;
      color: #15803d;
      border: 1px solid #86efac;
    }

    .message.info {
      display: block;
      background-color: #dbeafe;
      color: #1d4ed8;
      border: 1px solid #93c5fd;
    }

    /* Register link */
    .register-link {
      text-align: center;
      margin-top: 18px;
      font-size: 13px;
      color: #607080;
    }

    .register-link a {
      color: #1a2757;
      font-weight: bold;
      text-decoration: none;
    }

    .register-link a:hover { text-decoration: underline; }

    /* Loading spinner on button */
    .loading { opacity: 0.7; cursor: wait; }

  </style>
</head>

<body>

  <!-- LOGO -->
  <div class="logo">
    <img src="logo.png" alt="Lokseva Logo" width="110" height="110" style="border-radius:50%;"/>
  </div>

  <!-- CARD -->
  <div class="card">

    <div class="app-name">Lokseva</div>
    <div class="app-tagline">Local Services, At Your Doorstep</div>

    <!-- ROLE BUTTONS -->
    <div class="role-buttons">
      <button class="role-btn" onclick="selectRole('user')">USER</button>
      <button class="role-btn" onclick="selectRole('provider')">PROVIDER</button>
      <button class="role-btn" onclick="selectRole('admin')">ADMIN</button>
    </div>

    <!-- ===== USER LOGIN FORM ===== -->
    <div class="form-section" id="form-user">
      <div class="form-title">User Login</div>
      <div class="message" id="msg-user"></div>

      <label>Email (Gmail only)</label>
      <input type="email" id="user-email" placeholder="example@gmail.com" />

      <label>Password</label>
      <input type="password" id="user-password" placeholder="Enter your password" />

      <button class="btn" id="user-login-btn" onclick="loginUser('user')">
        Login as User
      </button>
    </div>

    <!-- ===== PROVIDER LOGIN FORM ===== -->
    <div class="form-section" id="form-provider">
      <div class="form-title">Provider Login</div>
      <div class="message" id="msg-provider"></div>

      <label>Email (Gmail only)</label>
      <input type="email" id="provider-email" placeholder="example@gmail.com" />

      <label>Password</label>
      <input type="password" id="provider-password" placeholder="Enter your password" />

      <button class="btn" id="provider-login-btn" onclick="loginUser('provider')">
        Login as Provider
      </button>
    </div>

    <!-- ===== ADMIN LOGIN FORM ===== -->
    <div class="form-section" id="form-admin">
      <div class="form-title">Admin Login</div>
      <div class="message" id="msg-admin"></div>

      <label>Admin Username</label>
      <input type="text" id="admin-username" placeholder="Admin Username" />

      <label>Admin Password</label>
      <input type="password" id="admin-password" placeholder="Admin Password" />

      <button class="btn" onclick="adminLogin()">Login as Admin</button>
    </div>

    <!-- Register link -->
    <div class="register-link">
      Don't have an account? <a href="register.html">Register here</a>
    </div>

  </div><!-- end card -->


  <script>

    // ── Fixed admin credentials ──
    var ADMIN_USER = "admin";
    var ADMIN_PASS = "admin123";

    // ── Role switcher ──
    function selectRole(role) {
      document.querySelectorAll('.role-btn').forEach(function(b) {
        b.classList.remove('active');
        if (b.textContent.toLowerCase().includes(role)) b.classList.add('active');
      });
      document.querySelectorAll('.form-section').forEach(function(f) {
        f.classList.remove('active');
      });
      document.getElementById('form-' + role).classList.add('active');
      clearMessage('user');
      clearMessage('provider');
      clearMessage('admin');
    }

    function showMessage(role, text, type) {
      var box = document.getElementById('msg-' + role);
      box.textContent = text;
      box.className = 'message ' + type;
    }

    function clearMessage(role) {
      var box = document.getElementById('msg-' + role);
      box.textContent = '';
      box.className = 'message';
    }

    // ── USER / PROVIDER LOGIN → calls backend ──
    async function loginUser(role) {
      var email    = document.getElementById(role + '-email').value.trim().toLowerCase();
      var password = document.getElementById(role + '-password').value.trim();
      var btn      = document.getElementById(role + '-login-btn');

      // Basic validation
      if (!email || !password) {
        showMessage(role, '⚠️ Please fill in all fields.', 'error');
        return;
      }
      if (!email.endsWith('@gmail.com')) {
        showMessage(role, '⚠️ Please use a valid @gmail.com address.', 'error');
        return;
      }

      // Disable button while loading
      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';
      showMessage(role, '⏳ Please wait...', 'info');

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();

        if (!data.success) {
          showMessage(role, '⚠️ ' + data.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Login as ' + role.charAt(0).toUpperCase() + role.slice(1);
          return;
        }

        // Store auth data in localStorage
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        console.log("✅ Login successful! User stored:", data.user.name);

        // Success — redirect based on role
        setTimeout(function () {
          if (data.user.role === 'user') {
            window.location.href = 'user-dashboard.html';
          } else if (data.user.role === 'provider') {
            window.location.href = 'provider-dashboard.html';
          } else if (data.user.role === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else {
            console.log("Role missing:", data.user);
          }
        }, 1500);
      } catch (err) {
        showMessage(role, '⚠️ Cannot connect to server. Make sure Node.js is running and open this page via http://localhost:3000.', 'error');
        btn.disabled = false;
        btn.textContent = 'Login as ' + role.charAt(0).toUpperCase() + role.slice(1);
      }
    }

    // ── ADMIN LOGIN → checks fixed credentials (no backend needed) ──
    function adminLogin() {
      var username = document.getElementById('admin-username').value.trim();
      var password = document.getElementById('admin-password').value.trim();

      if (!username || !password) {
        showMessage('admin', '⚠️ Please enter both username and password.', 'error');
        return;
      }

      if (username === ADMIN_USER && password === ADMIN_PASS) {
        showMessage('admin', '✅ Admin verified! Redirecting...', 'success');
        setTimeout(function() {
          window.location.href = 'admin-dashboard.html';
        }, 1500);
      } else {
        showMessage('admin', '❌ Wrong username or password.', 'error');
      }
    }

    // select default role so a form is shown immediately
    window.addEventListener('DOMContentLoaded', function() {
      selectRole('user');
    });
  </script>

  <!-- API Integration Scripts -->
  <script src="api.js"></script>
  <script src="login.js"></script>

</body>
</html>
